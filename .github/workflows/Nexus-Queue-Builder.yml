name: Nexus Queue Builder

on:
  workflow_dispatch:
    inputs:
      idea:
        description: "High-level idea to turn into .agent/queue.json"
        required: false
        default: "Build the repo into a YAML-driven LLM build harness."
      model:
        description: "NVIDIA-hosted model name"
        required: false
        default: "nvidia/nemotron-3-ultra-550b-a55b"
  push:
    branches:
      - main
    paths:
      - ".agent/goal.md"
      - ".agent/workflow.md"
      - ".github/workflows/Nexus-Queue-Builder.yml"

env:
  NVIDIA_SECRET_NAME: NVIDIA_API_KEY

permissions:
  contents: write

concurrency:
  group: nexus-queue-builder
  cancel-in-progress: false

jobs:
  build-queue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Build queue JSON
        env:
          NVIDIA_API_KEY: ${{ secrets[env.NVIDIA_SECRET_NAME] }}
          NVIDIA_MODEL: ${{ github.event.inputs.model }}
          QUEUE_IDEA: ${{ github.event.inputs.idea }}
        run: python -m agent_tools.queue_builder

      - name: Commit queue artifacts
        run: |
          git config user.name "nexus-queue-builder"
          git config user.email "nexus-queue-builder@users.noreply.github.com"
          git add .agent/queue.json .agent/runs/ .agent/LATEST.md
          if git diff --cached --quiet; then
            echo "No queue changes to commit."
            exit 0
          fi
          git commit -m "chore: build Nexus agent queue"
          git push
